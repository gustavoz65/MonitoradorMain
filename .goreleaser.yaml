version: 2
project_name: monimaster

before:
  hooks:
    - go mod tidy

builds:
  - id: native
    binary: monimaster
    env: [CGO_ENABLED=1]
    goos: [linux]
    goarch: [amd64]
    flags: ["-trimpath"]
    ldflags: ["-s -w -X main.version={{.Version}}"]

  - id: cross
    binary: monimaster
    env: [CGO_ENABLED=0]
    goos: [linux, windows, darwin]
    goarch: [amd64, arm64]
    ignore:
      - goos: linux
        goarch: amd64
    flags: ["-trimpath"]
    ldflags: ["-s -w -X main.version={{.Version}}"]

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: gustavoz65
    name: MonitoradorMain
